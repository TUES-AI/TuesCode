<!doctype html>
<meta charset="utf-8">
<meta name="robots" content="noindex">
<title>Redirect</title>

<script>
	(async () => {
		const txt = await fetch("current.txt?ts=" + Date.now(), {cache: "no-store"}).then(r => r.text());
		const url = txt.trim();

		if (!url) {
			document.body.innerHTML = `
      <h1>Server is sleeping 💤</h1>
      <p>Come back tomorrow for more python fun!</p>
	  <p>In the meantime, watch these videos:</p>
	  <a href="https://www.youtube.com/watch?v=aircAruvnKk" target="_blank" rel="noopener noreferrer">3Blue1Brown: Intro to Neural Networks</a>
	  <br>
	  <a href="https://youtu.be/IHZwWFHWa-w?si=gwSp6neZo4HMeCuu" target="_blank" rel="noopener noreferrer">3Blue1Brown: Gradient Descent</a>
	  <br>
	  <p>If its still daytime the server might be down for a quick restart and should be back up soon!</p>
			`;
			return;
		}

		if (!/^https:\/\//.test(url)) throw new Error("current.txt must contain an https:// URL");
		location.replace(url);
	})().catch(e => document.body.textContent = "Redirect failed: " + e.message);
</script>
